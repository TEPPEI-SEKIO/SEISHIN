<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>震度6 ×4回 層間変位シミュレーション</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif;
    background: #f5f4f0;
    color: #2c2c2a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 32px;
  }
  h1 {
    font-size: 18px;
    font-weight: 500;
    margin-bottom: 4px;
    text-align: center;
  }
  .subtitle {
    font-size: 13px;
    color: #888780;
    margin-bottom: 20px;
    text-align: center;
  }
  .controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 16px;
  }
  .eq-btn {
    padding: 8px 18px;
    font-size: 13px;
    border-radius: 8px;
    border: 1px solid #b4b2a9;
    background: #fff;
    color: #2c2c2a;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s, color 0.12s;
    font-family: inherit;
  }
  .eq-btn:hover { background: #ede9e2; }
  .eq-btn.active { border-color: #A32D2D; color: #A32D2D; background: #FCEBEB; }
  .play-btn {
    padding: 8px 18px;
    font-size: 13px;
    border-radius: 8px;
    border: 1px solid #b4b2a9;
    background: #fff;
    color: #2c2c2a;
    cursor: pointer;
    font-family: inherit;
    display: flex; align-items: center; gap: 6px;
  }
  .play-btn:hover { background: #ede9e2; }

  .stats {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 16px;
    width: 100%;
    max-width: 720px;
  }
  .stat-card {
    background: #fff;
    border: 1px solid #d3d1c7;
    border-radius: 8px;
    padding: 10px 16px;
    min-width: 100px;
    text-align: center;
    flex: 1;
  }
  .stat-label { font-size: 11px; color: #888780; margin-bottom: 3px; }
  .stat-val   { font-size: 20px; font-weight: 500; }
  .stat-unit  { font-size: 11px; color: #888780; }
  .judge-card { min-width: 160px; }
  .dmg-bar-wrap { height: 6px; background: #e8e6de; border-radius: 3px; margin-top: 6px; overflow: hidden; }
  .dmg-bar { height: 100%; border-radius: 3px; transition: width 0.5s ease; }

  svg { display: block; }
  .svg-wrap {
    width: 100%;
    max-width: 720px;
    background: #fff;
    border: 1px solid #d3d1c7;
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 16px;
  }

  .chart-wrap {
    width: 100%;
    max-width: 720px;
    background: #fff;
    border: 1px solid #d3d1c7;
    border-radius: 12px;
    padding: 14px 16px 10px;
  }
  .legend {
    display: flex; gap: 16px; font-size: 12px; color: #888780;
    margin-bottom: 8px; flex-wrap: wrap;
  }
  .legend-dot { width: 12px; height: 3px; border-radius: 1px; display: inline-block; vertical-align: middle; margin-right: 4px; }
  canvas { width: 100%; display: block; }

  .footer {
    margin-top: 20px;
    font-size: 11px;
    color: #b4b2a9;
    text-align: center;
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }
</style>
</head>
<body>

<h1>震度6 ×4回　層間変位シミュレーション</h1>
<p class="subtitle">2階建て木造住宅（各階高 3m）／地震が繰り返すたびに剛性が低下し変位が増大する</p>

<div class="controls">
  <button class="eq-btn active" data-eq="0" onclick="selectEq(0)">1回目　震度6弱</button>
  <button class="eq-btn"        data-eq="1" onclick="selectEq(1)">2回目　震度6強</button>
  <button class="eq-btn"        data-eq="2" onclick="selectEq(2)">3回目　震度6強</button>
  <button class="eq-btn"        data-eq="3" onclick="selectEq(3)">4回目　震度6強</button>
  <button class="play-btn" onclick="playAll()">&#9654; 連続再生</button>
</div>

<div class="stats">
  <div class="stat-card">
    <div class="stat-label">1階　層間変位</div>
    <div class="stat-val" id="d1-val">—</div>
    <div class="stat-unit">mm</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">2階　層間変位</div>
    <div class="stat-val" id="d2-val">—</div>
    <div class="stat-unit">mm</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">1階　変位角</div>
    <div class="stat-val" id="r1-val">—</div>
    <div class="stat-unit">rad</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">2階　変位角</div>
    <div class="stat-val" id="r2-val">—</div>
    <div class="stat-unit">rad</div>
  </div>
  <div class="stat-card judge-card">
    <div class="stat-label">累積損傷度</div>
    <div class="stat-val" id="judge-val" style="font-size:14px;line-height:1.4;">—</div>
    <div class="dmg-bar-wrap"><div class="dmg-bar" id="dmg-bar" style="width:0%;background:#639922;"></div></div>
  </div>
</div>

<div class="svg-wrap">
<svg id="main-svg" width="100%" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ground -->
  <rect x="110" y="366" width="250" height="10" rx="2" fill="#b4b2a9" opacity=".6"/>
  <line x1="110" y1="376" x2="360" y2="376" stroke="#888780" stroke-width="0.5" opacity=".5"/>
  <line x1="120" y1="376" x2="110" y2="388" stroke="#888780" stroke-width="0.5" opacity=".5"/>
  <line x1="140" y1="376" x2="130" y2="388" stroke="#888780" stroke-width="0.5" opacity=".5"/>
  <line x1="160" y1="376" x2="150" y2="388" stroke="#888780" stroke-width="0.5" opacity=".5"/>
  <line x1="180" y1="376" x2="170" y2="388" stroke="#888780" stroke-width="0.5" opacity=".5"/>
  <line x1="200" y1="376" x2="190" y2="388" stroke="#888780" stroke-width="0.5" opacity=".5"/>
  <line x1="220" y1="376" x2="210" y2="388" stroke="#888780" stroke-width="0.5" opacity=".5"/>
  <line x1="240" y1="376" x2="230" y2="388" stroke="#888780" stroke-width="0.5" opacity=".5"/>
  <line x1="260" y1="376" x2="250" y2="388" stroke="#888780" stroke-width="0.5" opacity=".5"/>
  <line x1="280" y1="376" x2="270" y2="388" stroke="#888780" stroke-width="0.5" opacity=".5"/>
  <line x1="300" y1="376" x2="290" y2="388" stroke="#888780" stroke-width="0.5" opacity=".5"/>
  <line x1="320" y1="376" x2="310" y2="388" stroke="#888780" stroke-width="0.5" opacity=".5"/>
  <line x1="340" y1="376" x2="330" y2="388" stroke="#888780" stroke-width="0.5" opacity=".5"/>
  <line x1="360" y1="376" x2="350" y2="388" stroke="#888780" stroke-width="0.5" opacity=".5"/>

  <!-- ghost (original shape) -->
  <g opacity=".12" stroke="#2c2c2a" stroke-width="0.5" fill="none">
    <rect x="148" y="80" width="184" height="10"/>
    <rect x="148" y="215" width="184" height="10"/>
    <rect x="148" y="357" width="184" height="10"/>
    <rect x="148" y="80"  width="8"   height="288"/>
    <rect x="324" y="80"  width="8"   height="288"/>
  </g>

  <!-- limit lines -->
  <line x1="118" y1="147" x2="360" y2="147" stroke="#A32D2D" stroke-width="0.6" stroke-dasharray="5 3" opacity=".5"/>
  <text x="365" y="151" font-size="11" fill="#A32D2D" opacity=".75" font-family="sans-serif">1/100 限界</text>
  <line x1="118" y1="177" x2="360" y2="177" stroke="#BA7517" stroke-width="0.6" stroke-dasharray="4 3" opacity=".5"/>
  <text x="365" y="181" font-size="11" fill="#BA7517" opacity=".75" font-family="sans-serif">1/150</text>

  <!-- cracks group -->
  <g id="cracks"></g>

  <!-- building columns / slabs -->
  <!-- 1F columns -->
  <line id="col1L"   x1="152" y1="357" x2="152" y2="225" stroke="#2c2c2a" stroke-width="9"  stroke-linecap="square" opacity=".10"/>
  <line id="col1Ls"  x1="152" y1="357" x2="152" y2="225" stroke="#2c2c2a" stroke-width="1"  stroke-linecap="square" opacity=".55"/>
  <line id="col1R"   x1="328" y1="357" x2="328" y2="225" stroke="#2c2c2a" stroke-width="9"  stroke-linecap="square" opacity=".10"/>
  <line id="col1Rs"  x1="328" y1="357" x2="328" y2="225" stroke="#2c2c2a" stroke-width="1"  stroke-linecap="square" opacity=".55"/>
  <!-- 2F columns -->
  <line id="col2L"   x1="152" y1="225" x2="152" y2="90"  stroke="#2c2c2a" stroke-width="9"  stroke-linecap="square" opacity=".10"/>
  <line id="col2Ls"  x1="152" y1="225" x2="152" y2="90"  stroke="#2c2c2a" stroke-width="1"  stroke-linecap="square" opacity=".55"/>
  <line id="col2R"   x1="328" y1="225" x2="328" y2="90"  stroke="#2c2c2a" stroke-width="9"  stroke-linecap="square" opacity=".10"/>
  <line id="col2Rs"  x1="328" y1="225" x2="328" y2="90"  stroke="#2c2c2a" stroke-width="1"  stroke-linecap="square" opacity=".55"/>
  <!-- slabs -->
  <rect id="slab2" x="144" y="216" width="192" height="10" rx="1" fill="#e8e6de" stroke="#2c2c2a" stroke-width="0.5" opacity=".7"/>
  <rect id="slabR" x="144" y="80"  width="192" height="10" rx="1" fill="#e8e6de" stroke="#2c2c2a" stroke-width="0.5" opacity=".7"/>
  <text id="lbl1F" x="240" y="300" text-anchor="middle" font-size="13" fill="#888780" font-family="sans-serif">1F</text>
  <text id="lbl2F" x="240" y="160" text-anchor="middle" font-size="13" fill="#888780" font-family="sans-serif">2F</text>

  <!-- story height lines -->
  <line x1="84" y1="90" x2="84" y2="357" stroke="#b4b2a9" stroke-width="0.5"/>
  <text x="58" y="228" text-anchor="middle" font-size="10" fill="#b4b2a9" font-family="sans-serif" transform="rotate(-90,58,228)">h = 3m</text>
  <text x="58" y="168" text-anchor="middle" font-size="10" fill="#b4b2a9" font-family="sans-serif" transform="rotate(-90,58,168)">h = 3m</text>

  <!-- force arrows -->
  <line id="force2" x1="450" y1="85" x2="400" y2="85" stroke="#D85A30" stroke-width="2.5" marker-end="url(#arr)" fill="none" opacity="0"/>
  <text id="force2lbl" x="456" y="89" font-size="12" fill="#D85A30" font-family="sans-serif" opacity="0">Q₂</text>
  <line id="force1" x1="430" y1="221" x2="390" y2="221" stroke="#D85A30" stroke-width="1.8" marker-end="url(#arr)" fill="none" opacity="0"/>
  <text id="force1lbl" x="436" y="225" font-size="12" fill="#D85A30" font-family="sans-serif" opacity="0">Q₁</text>

  <!-- dimension lines -->
  <line id="dim1" x1="90" y1="300" x2="90" y2="300" stroke="#185FA5" stroke-width="1.5" marker-start="url(#arr)" marker-end="url(#arr)" fill="none" opacity="0"/>
  <text id="dim1lbl" x="90" y="315" text-anchor="middle" font-size="11" fill="#185FA5" font-family="sans-serif" opacity="0">δ₁</text>
  <line id="dim2" x1="90" y1="155" x2="90" y2="155" stroke="#185FA5" stroke-width="1.5" marker-start="url(#arr)" marker-end="url(#arr)" fill="none" opacity="0"/>
  <text id="dim2lbl" x="90" y="144" text-anchor="middle" font-size="11" fill="#185FA5" font-family="sans-serif" opacity="0">δ₂</text>

  <!-- title area -->
  <text id="eq-title" x="240" y="26" text-anchor="middle" font-size="15" font-weight="600" fill="#2c2c2a" font-family="sans-serif" opacity="0">—</text>
  <text id="eq-desc"  x="240" y="44" text-anchor="middle" font-size="11" fill="#888780"    font-family="sans-serif" opacity="0">—</text>
</svg>
</div>

<div class="chart-wrap">
  <div class="legend">
    <span><span class="legend-dot" style="background:#185FA5;"></span>1階 層間変位</span>
    <span><span class="legend-dot" style="background:#D85A30;"></span>2階 層間変位</span>
    <span><span class="legend-dot" style="background:#A32D2D;opacity:.5;"></span>1/100 限界（30mm）</span>
    <span><span class="legend-dot" style="background:#BA7517;opacity:.5;"></span>1/150（20mm）</span>
  </div>
  <canvas id="hist-chart" height="90"></canvas>
</div>

<p class="footer">建築基準法：大地震時 1/100 rad 以内、損傷限界 1/200 rad　／　このファイルはオフラインで動作します</p>

<script>
const STORY_H = 3000, SCALE = 1.6;
const EQS = [
  {label:"震度6弱　1回目", desc:"初回・剛性低下なし　弾性範囲内", d1:25, d2:20, dmg:0.15, dmgText:"軽微ひび割れ",
   cracks:[{x1:152,y1:280,x2:165,y2:270,w:1},{x1:328,y1:290,x2:315,y2:278,w:1}]},
  {label:"震度6強　2回目", desc:"剛性10%低下・変位が増大",        d1:30, d2:24, dmg:0.38, dmgText:"中程度損傷・仕上材損傷",
   cracks:[{x1:152,y1:250,x2:168,y2:238,w:1.2},{x1:328,y1:260,x2:312,y2:247,w:1.2}]},
  {label:"震度6強　3回目", desc:"剛性25%低下・残留変形発生",       d1:36, d2:29, dmg:0.65, dmgText:"大きな損傷・構造体損傷",
   cracks:[{x1:152,y1:230,x2:172,y2:215,w:1.5},{x1:328,y1:240,x2:308,y2:225,w:1.5}]},
  {label:"震度6強　4回目", desc:"剛性40%低下・倒壊危険水準",       d1:44, d2:36, dmg:0.92, dmgText:"重大損傷・要避難",
   cracks:[{x1:148,y1:215,x2:178,y2:198,w:2},{x1:332,y1:218,x2:302,y2:200,w:2}]},
];
const CRACK_COLORS = ["#cc4444","#bb3333","#aa2222","#881111"];

let curEq=0, raf=null, playTimer=null;

function lerp(a,b,t){return a+(b-a)*t;}
function ease(t){return t<.5?2*t*t:-1+(4-2*t)*t;}

function setLine(id,x1,y1,x2,y2){
  const el=document.getElementById(id);
  el.setAttribute('x1',x1);el.setAttribute('y1',y1);
  el.setAttribute('x2',x2);el.setAttribute('y2',y2);
}
function setAttr(id,attr,val){document.getElementById(id).setAttribute(attr,val);}
function setOpacity(id,v){document.getElementById(id).style.opacity=v;}

function setBuilding(d1,d2){
  const bL=152,bR=328;
  const x2L=bL+d1, x2R=bR+d1, xRL=bL+d1+d2, xRR=bR+d1+d2;
  setLine('col1L', bL,357, x2L,225); setLine('col1Ls',bL,357,x2L,225);
  setLine('col1R', bR,357, x2R,225); setLine('col1Rs',bR,357,x2R,225);
  setLine('col2L', x2L,225,xRL,90);  setLine('col2Ls',x2L,225,xRL,90);
  setLine('col2R', x2R,225,xRR,90);  setLine('col2Rs',x2R,225,xRR,90);
  setAttr('slab2','x',x2L-8);
  setAttr('slabR','x',xRL-8);
  setAttr('lbl1F','x',(bL+x2L+bR+x2R)/4);
  setAttr('lbl2F','x',(x2L+xRL+x2R+xRR)/4);

  const show=d1>0.5;
  ['force2','force2lbl','force1','force1lbl','dim1','dim1lbl','dim2','dim2lbl'].forEach(id=>setOpacity(id,show?1:0));
  if(show){
    setLine('force2',xRL+55,85,xRL+10,85); setAttr('force2lbl','x',xRL+61);
    setLine('force1',x2L+50,221,x2L+10,221); setAttr('force1lbl','x',x2L+56);
    setLine('dim1',bL-62,300,x2L-62,300);
    setAttr('dim1lbl','x',(bL-62+x2L-62)/2);
    setLine('dim2',x2L-62,155,xRL-62,155);
    setAttr('dim2lbl','x',(x2L-62+xRL-62)/2);
  }
}

function showCracks(upTo){
  const g=document.getElementById('cracks');
  g.innerHTML='';
  for(let i=0;i<=upTo;i++){
    const eq=EQS[i];
    eq.cracks.forEach(c=>{
      const ln=document.createElementNS('http://www.w3.org/2000/svg','line');
      ln.setAttribute('x1',c.x1);ln.setAttribute('y1',c.y1);
      ln.setAttribute('x2',c.x2);ln.setAttribute('y2',c.y2);
      ln.setAttribute('stroke',CRACK_COLORS[i]);
      ln.setAttribute('stroke-width',c.w);
      ln.setAttribute('stroke-dasharray','3 2');
      ln.setAttribute('opacity','0.85');
      g.appendChild(ln);
    });
  }
}

function animateEq(i){
  if(raf) cancelAnimationFrame(raf);
  const eq=EQS[i];
  const tD1=eq.d1*SCALE, tD2=eq.d2*SCALE;
  const FRAMES=36; let f=0;
  document.getElementById('eq-title').textContent=eq.label;
  document.getElementById('eq-title').style.opacity=1;
  document.getElementById('eq-desc').textContent=eq.desc;
  document.getElementById('eq-desc').style.opacity=1;
  showCracks(i);
  function tick(){
    const t=Math.min(f/FRAMES,1), e=ease(t);
    setBuilding(lerp(0,tD1,e),lerp(0,tD2,e));
    if(f<FRAMES){f++;raf=requestAnimationFrame(tick);}
    else updateStats(eq);
  }
  setBuilding(0,0);
  raf=requestAnimationFrame(tick);
}

function updateStats(eq){
  document.getElementById('d1-val').textContent=eq.d1;
  document.getElementById('d2-val').textContent=eq.d2;
  document.getElementById('r1-val').textContent='1/'+Math.round(STORY_H/eq.d1);
  document.getElementById('r2-val').textContent='1/'+Math.round(STORY_H/eq.d2);
  const pct=Math.round(eq.dmg*100);
  const bar=document.getElementById('dmg-bar');
  bar.style.width=pct+'%';
  bar.style.background=pct>80?'#A32D2D':pct>50?'#BA7517':'#639922';
  const jel=document.getElementById('judge-val');
  jel.textContent=eq.dmgText;
  jel.style.color=pct>80?'#A32D2D':pct>50?'#BA7517':'#3B6D11';
}

function selectEq(i){
  curEq=i;
  document.querySelectorAll('.eq-btn[data-eq]').forEach(b=>{
    b.classList.toggle('active',parseInt(b.dataset.eq)===i);
  });
  animateEq(i);
  updateChart(i);
}

function updateChart(sel){
  const canvas=document.getElementById('hist-chart');
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const W=canvas.offsetWidth||680, CH=90;
  canvas.width=W*dpr; canvas.height=CH*dpr;
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,CH);
  const maxD=50, pad=24, chartH=CH-18;
  const barW=(W-pad*2)/4;
  [[30,'#A32D2D'],[20,'#BA7517']].forEach(([d,c])=>{
    const y=chartH-(d/maxD*chartH)+2;
    ctx.strokeStyle=c;ctx.globalAlpha=.4;ctx.setLineDash([5,3]);ctx.lineWidth=.8;
    ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(W-8,y);ctx.stroke();
    ctx.setLineDash([]);
  });
  ctx.globalAlpha=1;
  EQS.forEach((eq,i)=>{
    const x=pad+i*barW+barW*.1, w=barW*.36;
    ctx.globalAlpha=i===sel?1:.22;
    const y1=chartH-(eq.d1/maxD*chartH)+2;
    ctx.fillStyle='#185FA5'; ctx.fillRect(x,y1,w,chartH-y1);
    const y2=chartH-(eq.d2/maxD*chartH)+2;
    ctx.fillStyle='#D85A30'; ctx.fillRect(x+w+3,y2,w,chartH-y2);
    ctx.globalAlpha=1;
    ctx.fillStyle=i===sel?'#2c2c2a':'#b4b2a9';
    ctx.font=(i===sel?'500 ':'')+'11px sans-serif';
    ctx.textAlign='center';
    ctx.fillText((i+1)+'回目',x+w,CH-3);
  });
}

function playAll(){
  clearTimeout(playTimer);
  let i=0;
  function next(){if(i>=4)return;selectEq(i);i++;playTimer=setTimeout(next,2200);}
  next();
}

selectEq(0);
window.addEventListener('resize',()=>updateChart(curEq));
</script>
</body>
</html>
